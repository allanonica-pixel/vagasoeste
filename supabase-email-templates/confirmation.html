<!DOCTYPE html>
<html lang="pt-BR" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Confirme seu Cadastro — VagasOeste</title>
</head>
<!--
  Supabase Template Type : confirm_signup
  Assunto configurado no dashboard: Confirme seu Cadastro - VagasOeste
  Variáveis usadas: {{ .ConfirmationURL }}, {{ .SiteURL }}
-->
<body style="margin:0;padding:0;background-color:#f3f4f6;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;">

  <table width="100%" cellpadding="0" cellspacing="0" border="0" role="presentation"
    style="background-color:#f3f4f6;">
    <tr>
      <td align="center" style="padding:40px 16px;">

        <table width="100%" cellpadding="0" cellspacing="0" border="0" role="presentation"
          style="max-width:520px;">

          <!-- LOGO -->
          <tr>
            <td align="center" style="padding-bottom:28px;">
              <table cellpadding="0" cellspacing="0" border="0" role="presentation">
                <tr>
                  <td style="background-color:#065f46;border-radius:10px;padding:10px 22px;">
                    <span style="color:#ffffff;font-size:17px;font-weight:700;letter-spacing:-0.3px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
                      VagasOeste
                    </span>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- CARD -->
          <tr>
            <td style="background-color:#ffffff;border-radius:16px;border:1px solid #e5e7eb;">

              <table width="100%" cellpadding="0" cellspacing="0" border="0" role="presentation">
                <tr>
                  <td style="background-color:#065f46;height:4px;font-size:1px;line-height:1px;border-radius:16px 16px 0 0;">&nbsp;</td>
                </tr>
              </table>

              <table width="100%" cellpadding="0" cellspacing="0" border="0" role="presentation">
                <tr>
                  <td style="padding:40px 40px 36px 40px;">

                    <h1 style="margin:0 0 20px 0;font-size:22px;font-weight:700;color:#111827;letter-spacing:-0.3px;line-height:1.3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
                      Confirme seu Cadastro
                    </h1>

                    <p style="margin:0 0 12px 0;font-size:15px;color:#374151;line-height:1.65;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
                      Olá! Bem-vindo(a) à <strong style="color:#065f46;">VagasOeste</strong>.
                    </p>

                    <p style="margin:0 0 28px 0;font-size:15px;color:#374151;line-height:1.65;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
                      Para ativar seu cadastro, clique no botão abaixo:
                    </p>

                    <!-- Botão CTA -->
                    <table cellpadding="0" cellspacing="0" border="0" role="presentation" style="margin-bottom:32px;">
                      <tr>
                        <td align="center" style="background-color:#065f46;border-radius:10px;">
                          <a href="{{ .ConfirmationURL }}" target="_blank"
                            style="display:inline-block;padding:14px 32px;color:#ffffff;font-size:15px;font-weight:600;text-decoration:none;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;letter-spacing:0.1px;">
                            👉&nbsp;&nbsp;Ativar cadastro
                          </a>
                        </td>
                      </tr>
                    </table>

                    <!-- Divisor -->
                    <table width="100%" cellpadding="0" cellspacing="0" border="0" role="presentation" style="margin-bottom:20px;">
                      <tr>
                        <td style="border-top:1px solid #f3f4f6;font-size:1px;line-height:1px;">&nbsp;</td>
                      </tr>
                    </table>

                    <p style="margin:0 0 20px 0;font-size:13px;color:#9ca3af;line-height:1.6;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
                      Se não foi você, ignore este e-mail.
                    </p>

                    <p style="margin:0;font-size:14px;color:#6b7280;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
                      Equipe <strong style="color:#065f46;">VagasOeste</strong>
                    </p>

                  </td>
                </tr>
              </table>

            </td>
          </tr>

          <!-- RODAPÉ -->
          <tr>
            <td align="center" style="padding:24px 0 0 0;">
              <p style="margin:0;font-size:12px;color:#9ca3af;line-height:1.8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
                © 2025 VagasOeste · Santarém, Pará<br>
                <a href="{{ .SiteURL }}" style="color:#065f46;text-decoration:none;">vagasoeste.com.br</a>
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
